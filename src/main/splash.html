<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>OpenFilms</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #060608;
      font-family: 'Montserrat Alternates', sans-serif;
      color: #fff;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Animated background gradient */
    .bg-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(35,97,253,0.15) 0%, rgba(0,212,255,0.05) 40%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    .logo-container {
      position: relative;
      z-index: 1;
      text-align: center;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-text {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .logo-text span {
      background: linear-gradient(135deg, #2361fd, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }

    /* Progress section */
    .progress-section {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeInUp 0.8s ease-out 0.3s backwards;
    }

    .progress-bar-track {
      width: 260px;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2361fd, #00d4ff);
      border-radius: 4px;
      transition: width 0.4s ease;
      box-shadow: 0 0 12px rgba(35, 97, 253, 0.5);
    }

    /* Indeterminate shimmer animation */
    .progress-bar-track::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 1.8s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .status-text {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 400;
      letter-spacing: 0.3px;
      transition: opacity 0.3s ease;
      min-height: 1.2em;
    }

    /* Dots animation for "loading" feel */
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* Version badge */
    .version {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.15);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="logo-container">
    <div class="logo-text">Open<span>Films</span></div>
    <div class="subtitle">Кино без границ и рекламы</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="status-text" id="statusText">
      <span class="dots">Запуск</span>
    </div>
  </div>

  <div class="version">v1.0.0</div>

  <script>
    // Listen for progress updates from main process
    window.addEventListener('message', (event) => {
      const { type, progress, text } = event.data || {};
      if (type === 'splash-progress') {
        const bar = document.getElementById('progressBar');
        const status = document.getElementById('statusText');
        if (bar) bar.style.width = `${progress}%`;
        if (status) status.innerHTML = text || '';
      }
    });
  </script>
</body>
</html>
